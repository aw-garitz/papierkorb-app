name: papierkorb_app
description: Papierkorb-Verwaltung für die Stadtverwaltung
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.5.0

  # Karte
  flutter_map: ^8.1.1
  latlong2: ^0.9.1

  # QR-Code Scanner
  mobile_scanner: ^5.1.0

  # QR-Code generieren (für PDF)
  qr_flutter: ^4.1.0

  # PDF erstellen + drucken
  pdf: ^3.10.8
  printing: ^5.12.0

  # Foto aufnehmen + komprimieren
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0

  # Umgebungsvariablen
  flutter_dotenv: ^5.1.0

  # GPS
  geolocator: ^12.0.0

  # UI Hilfsmittel
  cached_network_image: ^3.3.1
  intl: ^0.19.0
  excel: ^4.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/icon/abfalleimer.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/abfalleimer.png"
  web:
    generate: true
    image_path: "assets/icon/abfalleimer.png"
    background_color: "#2D5F6E"
    theme_color: "#2D5F6E"